<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neues Inserat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <span class="brand">Nachhilfe-Portal</span>
        <div class="nav-links">
            <a href="/">Zurück</a>
        </div>
    </nav>

    <div class="form-wrapper">
        <div class="form-card">
            <h1>Neues Inserat erstellen</h1>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endwith %}
            <form method="POST" action="/create_inserat">
                <div class="form-group">
                    <label for="subject">Fach</label>
                    <input type="text" id="subject" name="subject" placeholder="z. B. Mathematik" required>
                </div>
                <div class="form-group">
                    <label for="description">Beschreibung</label>
                    <textarea id="description" name="description" placeholder="Was bietest du an?" required></textarea>
                </div>
                <div class="form-group">
                    <label for="price_per_hour">Preis pro Stunde (CHF)</label>
                    <input type="number" id="price_per_hour" name="price_per_hour" step="0.01" placeholder="25.00" required>
                </div>
                <div class="form-group">
                    <label for="contact_info">Kontaktinformation</label>
                    <input type="text" id="contact_info" name="contact_info" placeholder="E-Mail oder Telefon" required>
                </div>
                <button type="submit" class="btn btn-primary">Inserat erstellen</button>
            </form>
        </div>
    </div>
</body>
</html>
