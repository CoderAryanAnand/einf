<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Inserat</title>
</head>
<body>
    <form method="POST" action="/create_inserat">
        <label for="subject">Subject:</label>
        <input type="text" id="subject" name="subject" required><br><br>
        <label for="description">Description:</label>
        <textarea id="description" name="description" required></textarea><br><br>
        <label for="price_per_hour">Price per hour:</label>
        <input type="number" id="price_per_hour" name="price_per_hour" step="0.01" required><br><br>
        <label for="contact_info">Contact Info:</label>
        <input type="text" id="contact_info" name="contact_info" required><br><br>
        <button type="submit">Create Inserat</button>
    </form>
</body>
</html>
